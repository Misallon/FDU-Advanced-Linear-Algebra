name: Build PDF (CI)

on:
  push:
    branches:
      - "**"
    paths:
      - "**/*.tex"
  pull_request:
    paths:
      - "**/*.tex"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf-${{ github.sha }}
          path: main.pdf
          retention-days: 14
